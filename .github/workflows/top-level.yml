on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-doc:
    runs-on: ${{ vars.RUNNER != '' && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Install pip packages
      run: |
        python3 -m venv venv
        source ./venv/bin/activate
        python3 -m ensurepip
        pip3 install -r docs/requirements.txt --upgrade

    - name: Build doc
      run: |
        source ./venv/bin/activate
        source .github/scripts/sphinx-build.sh

        export GIT_LFS_TO_LINKS="true"
        export GIT_ORG_REPOSITORY="${{ github.repository }}"
        [ "${{ github.event_name }}" = "pull_request" ] \
          && export GIT_BRANCH="${{ github.event.pull_request.head.ref }}" \
          || export GIT_BRANCH="${{ github.ref_name }}"

        [[ "${{ runner.debug }}" != "1" ]] && j_="-jauto"

        sphinx_build

    - name: Store the generated doc
      uses: actions/upload-artifact@v4
      with:
        name: html
        path: docs/_build/html

  check-doc:
    runs-on: ${{ vars.RUNNER != '' && fromJSON(vars.RUNNER) || 'ubuntu-latest' }}
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read

    steps:
    - uses: analogdevicesinc/doctools/checkout@action
    - name: Check writing
      run: |
        python3 -m venv venv
        source ./venv/bin/activate
        python3 -m ensurepip
        pip3 install docutils vale

        check_vale() {
          files=$(git diff --diff-filter=ACM --no-renames --name-only $base_sha..$head_sha -- 'docs/*.rst' 'docs/**/*.rst')

          echo "$1"
          vale sync --config=.github/styles/$1
          [[ -z "$files" ]] && return
          while read file; do
            echo "$file"
            vale --config=.github/styles/$1 --output=JSON  $file |  \
              jq -r 'to_entries[] | .key as $file | .value[] |
              "\($file):\(.Line):\(.Span[0])\n::\(.Severity) file=\($file),line=\(.Line),col=\(.Span[0])::vale:\(.Check):\(.Span[0]) \(.Message)"'
          done <<< "$files"
        }

        check_vale vale-spelling.ini
        check_vale vale-enforcement.ini

    - name: Check git lfs
      run: |
        git lfs install --skip-smudge --force

        _emit_fmt() {
          msg=$(echo "$1" | tr -d '\t')
          msg=$(printf "$msg" | sed ':a;N;$!ba;s/\n/'%0A'/g')
          printf "%s\n" "$msg"
          exit 1
        }

        lfs_error="
        At least one file should have been an LFS pointer, but is not.
        Please ensure that binary data was committed to git lfs, a tutorial is provided at:
        https://analogdevicesinc.github.io/documentation/contributing/creating_new_pages.html#adding-images-and-other-binary-files"

        git ls-files \
          | parallel -j "$(nproc)" --halt never '
            if git check-attr filter -- {} | grep -q "lfs$"; then
              line=$(git show :{} | head -n 1)
              if [ "$line" != "version https://git-lfs.github.com/spec/v1" ]; then
                echo "::error file={}::File should have been an LFS pointer, but is not"
                exit 1
              fi
            fi
          ' || _emit_fmt "::warning ::check_lfs: $lfs_error"

    - name: Check casing
      run: |
        python3 .github/scripts/case.py

    - name: Check dangling files
      run: |
        python3 .github/scripts/dangling.py || true

  deploy:
    runs-on: ubuntu-slim
    needs: [build-doc]
    concurrency:
      group: gh-pages
    permissions:
      contents: write
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'pull_request' ||
      github.ref_type == 'tag'

    steps:
    - uses: analogdevicesinc/doctools/gh-pages-deploy@action
      with:
        new_tag: ${{ github.ref_type == 'tag' }}
        tag: ${{ github.ref_name }}
        name: html

