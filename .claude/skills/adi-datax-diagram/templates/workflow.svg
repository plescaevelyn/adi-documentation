<?xml version="1.0" encoding="UTF-8"?>
<!--
  TEMPLATE: layered workflow with `Layer N` labels in the left margin and
  an inline software-stack box at the bottom.
  Examples in the repo: docs/overview/workflow-fpga.svg, workflow-mcu.svg,
                        workflow-rpi.svg, workflow-remote.svg, workflow-hil.svg.

  To customise:
    1. Replace `workflow-template` in the marker id with a unique stem.
    2. Update the layer labels in the left margin (x=30) to match your
       layer numbering — workflows in this repo use the seven-layer model
       described in docs/overview/architecture.rst.
    3. Adjust which layers appear and which are skipped (e.g. an MCU
       workflow may skip Layer 4 entirely; mark it `Not applicable`).
    4. Replace fills and titles. The bottom box is a wider area for the
       layered host-side software stack.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     class="adi-figure no-background"
     viewBox="0 0 900 620"
     width="100%"
     style="max-width: 880px; height: auto;">
  <defs>
    <marker id="workflow-template-arrowhead"
            markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrowhead-fill" />
    </marker>
  </defs>

  <!-- Outer panel -->
  <rect x="10" y="10" width="880" height="600" rx="14" class="adi-panel"/>
  <text x="450" y="35" class="adi-title" text-anchor="middle">Workflow N: short title</text>

  <!-- Layer labels in left margin -->
  <text x="30" y="100" class="layer-label">Layer 1</text>
  <text x="30" y="180" class="layer-label">Layer 2</text>
  <text x="30" y="290" class="layer-label">Layer 3</text>
  <text x="30" y="380" class="layer-label">Layer 4</text>
  <text x="30" y="470" class="layer-label">Layers</text>
  <text x="30" y="485" class="layer-label">5–7</text>

  <!-- Layer 1: Hardware -->
  <rect x="100" y="75" width="700" height="60" rx="8" class="box"
        fill="var(--adi-fill-hw)"/>
  <text x="450" y="100" class="box-text" text-anchor="middle">Hardware (signal chain)</text>
  <text x="450" y="120" class="box-desc" text-anchor="middle">ADI device — short description of what it does</text>

  <line x1="450" y1="135" x2="450" y2="155" class="arrow"
        marker-end="url(#workflow-template-arrowhead)"/>
  <text x="470" y="148" class="arrow-label">interface (e.g. SPI, JESD204C)</text>

  <!-- Layer 2: Hardware Interface (compute platform) -->
  <rect x="100" y="155" width="340" height="90" rx="8" class="box"
        fill="var(--adi-fill-mcu)"/>
  <text x="270" y="180" class="box-text" text-anchor="middle">Compute platform</text>
  <text x="270" y="200" class="box-desc" text-anchor="middle">FPGA / SoC / MCU model</text>
  <text x="155" y="222" class="box-desc">cores / PL details</text>
  <text x="330" y="222" class="box-desc">memory / clocks</text>

  <!-- Layer 3: HDL / Firmware -->
  <rect x="460" y="155" width="340" height="90" rx="8" class="box"
        fill="var(--adi-fill-hdl)"/>
  <text x="630" y="180" class="box-text" text-anchor="middle">HDL / firmware</text>
  <text x="630" y="200" class="box-desc" text-anchor="middle">What runs in the fabric or on the MCU</text>
  <text x="630" y="222" class="box-desc" text-anchor="middle">• key blocks</text>
  <text x="630" y="237" class="box-desc" text-anchor="middle">• key blocks</text>

  <line x1="440" y1="200" x2="460" y2="200" class="arrow"
        marker-end="url(#workflow-template-arrowhead)"/>

  <!-- Layer 3 detail strip -->
  <rect x="100" y="265" width="700" height="70" rx="8" class="box"
        fill="var(--adi-fill-good)" stroke-dasharray="5,5"/>
  <text x="450" y="290" class="box-text" text-anchor="middle">Layer 3 expansion</text>
  <text x="450" y="310" class="box-desc" text-anchor="middle">What HDL / firmware components are involved</text>
  <text x="450" y="327" class="box-desc" text-anchor="middle">and how they expose interfaces upward</text>

  <line x1="270" y1="245" x2="270" y2="265" class="arrow"
        marker-end="url(#workflow-template-arrowhead)"/>

  <!-- Layer 4: Drivers -->
  <rect x="100" y="355" width="700" height="70" rx="8" class="box"
        fill="var(--adi-fill-drv)"/>
  <text x="450" y="380" class="box-text" text-anchor="middle">Linux IIO driver / TinyIIO</text>
  <text x="450" y="400" class="box-desc" text-anchor="middle">• What the driver does (init, configure, expose)</text>
  <text x="450" y="417" class="box-desc" text-anchor="middle">• Buffers / DMA / sysfs attributes</text>

  <line x1="450" y1="335" x2="450" y2="355" class="arrow"
        marker-end="url(#workflow-template-arrowhead)"/>

  <!-- Layers 5-7: Software stack -->
  <rect x="100" y="445" width="700" height="140" rx="8" class="box"
        fill="var(--adi-fill-app)"/>
  <text x="450" y="470" class="box-text" text-anchor="middle">Host software stack (Layers 5–7)</text>

  <text x="140" y="495" class="box-desc" font-weight="bold">Layer 5 — libiio:</text>
  <text x="160" y="510" class="box-desc">backend URI (e.g. local: / serial: / ip:)</text>

  <text x="140" y="532" class="box-desc" font-weight="bold">Layer 6 — pyadi-iio:</text>
  <text x="160" y="547" class="box-desc">device class (e.g. adi.&lt;part&gt;)</text>
  <text x="160" y="562" class="box-desc">data = device.rx() returns NumPy</text>

  <text x="490" y="495" class="box-desc" font-weight="bold">Layer 7 — Applications:</text>
  <text x="510" y="510" class="box-desc">• Scopy / IIO Oscilloscope</text>
  <text x="510" y="525" class="box-desc">• MATLAB / Python scripts</text>
  <text x="510" y="540" class="box-desc">• Custom apps</text>

  <line x1="450" y1="425" x2="450" y2="445" class="arrow"
        marker-end="url(#workflow-template-arrowhead)"/>

  <!-- Bottom note -->
  <text x="450" y="600" class="note-text" text-anchor="middle">One-line takeaway about the workflow's strengths or trade-offs.</text>
</svg>
