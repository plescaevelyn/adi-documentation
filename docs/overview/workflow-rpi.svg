<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" class="adi-figure no-background" viewBox="0 0 930 670" width="100%" style="max-width: 920px; height: auto;">
  <defs>
    <marker id="wrpi-arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrowhead-fill" />
    </marker>
  </defs>

  <!-- Panel -->
  <rect x="10" y="10" width="920" height="650" rx="14" class="adi-panel"/>

  <!-- Title -->
  <text x="450" y="35" class="adi-title" text-anchor="middle">Workflow 3: Raspberry Pi + Evaluation Boards</text>

  <!-- Layer labels -->
  <text x="30" y="115" class="layer-label">Layer 1</text>
  <text x="30" y="220" class="layer-label">Layer 2</text>
  <text x="30" y="360" class="layer-label">Layer 4</text>
  <text x="30" y="500" class="layer-label">Layers</text>
  <text x="30" y="513" class="layer-label">5-7</text>

  <!-- Layer 1: Multiple ADI Devices -->
  <rect x="100" y="75" width="240" height="100" rx="8" class="box" fill="var(--adi-fill-hw)"/>
  <text x="220" y="100" class="box-text" text-anchor="middle">Arduino Shields (ARDZ)</text>
  <text x="220" y="120" class="box-desc" text-anchor="middle">Precision ADCs:</text>
  <text x="220" y="137" class="box-desc" text-anchor="middle">• AD4080 / AD4052</text>
  <text x="220" y="152" class="box-desc" text-anchor="middle">• AD5592R (ADC/DAC)</text>
  <text x="220" y="167" class="box-desc" text-anchor="middle">Connect via SPI/I2C</text>

  <rect x="380" y="75" width="240" height="100" rx="8" class="box" fill="var(--adi-fill-hw)"/>
  <text x="500" y="100" class="box-text" text-anchor="middle">USB Instruments</text>
  <text x="500" y="120" class="box-desc" text-anchor="middle">ADALM2000 (M2k):</text>
  <text x="500" y="137" class="box-desc" text-anchor="middle">• 2-ch Oscilloscope</text>
  <text x="500" y="152" class="box-desc" text-anchor="middle">• Signal generator</text>
  <text x="500" y="167" class="box-desc" text-anchor="middle">Connect via USB</text>

  <rect x="660" y="75" width="240" height="100" rx="8" class="box" fill="var(--adi-fill-hw)"/>
  <text x="780" y="100" class="box-text" text-anchor="middle">Remote Devices</text>
  <text x="780" y="120" class="box-desc" text-anchor="middle">Network-connected:</text>
  <text x="780" y="137" class="box-desc" text-anchor="middle">• Other RPi nodes</text>
  <text x="780" y="152" class="box-desc" text-anchor="middle">• Zynq boards</text>
  <text x="780" y="167" class="box-desc" text-anchor="middle">Connect via Ethernet</text>

  <!-- Arrows down to RPi -->
  <line x1="220" y1="175" x2="220" y2="190" class="arrow" marker-end="url(#wrpi-arrowhead)"/>
  <text x="155" y="185" class="arrow-label">SPI/I2C</text>

  <line x1="500" y1="175" x2="450" y2="190" class="arrow" marker-end="url(#wrpi-arrowhead)"/>
  <text x="480" y="185" class="arrow-label">USB</text>

  <line x1="780" y1="175" x2="730" y2="190" class="arrow" marker-end="url(#wrpi-arrowhead)"/>
  <text x="760" y="185" class="arrow-label">Network</text>

  <!-- Layer 2: Raspberry Pi 4 -->
  <rect x="100" y="190" width="800" height="110" rx="8" class="box" fill="var(--adi-fill-mcu)"/>
  <text x="500" y="215" class="box-text" text-anchor="middle">Raspberry Pi 4 with Kuiper Linux</text>
  <text x="500" y="235" class="box-desc" text-anchor="middle">ARM Cortex-A72 (4 cores @ 1.5 GHz) • 4 GB RAM • Debian-based OS</text>

  <text x="120" y="257" class="box-desc">Hardware Interfaces:</text>
  <text x="120" y="272" class="box-desc">• GPIO header (SPI, I2C)</text>
  <text x="120" y="287" class="box-desc">• USB 3.0 ports (4x)</text>

  <text x="380" y="257" class="box-desc">Pre-Installed Software:</text>
  <text x="380" y="272" class="box-desc">• Linux kernel with IIO drivers</text>
  <text x="380" y="287" class="box-desc">• libiio, pyadi-iio, Scopy</text>

  <text x="640" y="257" class="box-desc">Network:</text>
  <text x="640" y="272" class="box-desc">• Gigabit Ethernet</text>
  <text x="640" y="287" class="box-desc">• WiFi (802.11ac)</text>

  <line x1="500" y1="300" x2="500" y2="320" class="arrow" marker-end="url(#wrpi-arrowhead)"/>

  <!-- Layer 4: Linux IIO Drivers -->
  <rect x="100" y="320" width="800" height="120" rx="8" class="box" fill="var(--adi-fill-drv)"/>
  <text x="500" y="345" class="box-text" text-anchor="middle">Linux IIO Drivers</text>
  <text x="500" y="365" class="box-desc" text-anchor="middle">Multiple drivers for different devices, all using IIO framework:</text>

  <text x="120" y="387" class="box-desc" font-weight="bold">For Arduino Shields:</text>
  <text x="140" y="402" class="box-desc">• ad4080, ad4052 (precision ADCs)</text>
  <text x="140" y="417" class="box-desc">• ad5592r (mixed-signal)</text>
  <text x="140" y="432" class="box-desc">Configured via devicetree overlays</text>

  <text x="420" y="387" class="box-desc" font-weight="bold">For USB Devices:</text>
  <text x="440" y="402" class="box-desc">• m2k context (ADALM2000)</text>
  <text x="440" y="417" class="box-desc">• Plug-and-play</text>
  <text x="440" y="432" class="box-desc">Auto-detected</text>

  <text x="680" y="387" class="box-desc" font-weight="bold">For Network:</text>
  <text x="700" y="402" class="box-desc">• IIOD forwarding</text>
  <text x="700" y="417" class="box-desc">• Remote contexts</text>
  <text x="700" y="432" class="box-desc">• ip: backend</text>

  <line x1="500" y1="440" x2="500" y2="460" class="arrow" marker-end="url(#wrpi-arrowhead)"/>

  <!-- Layers 5-7: Unified Software Stack -->
  <rect x="100" y="460" width="800" height="150" rx="8" class="box" fill="var(--adi-fill-app)"/>
  <text x="500" y="485" class="box-text" text-anchor="middle">Unified Software Stack (Layers 5-7)</text>

  <text x="120" y="510" class="box-desc" font-weight="bold">Layer 5 — libiio (Multi-Backend):</text>
  <text x="140" y="525" class="box-desc">local: for on-board devices • usb: for ADALM2000 • ip: for remote devices</text>

  <text x="120" y="547" class="box-desc" font-weight="bold">Layer 6 — pyadi-iio (Unified API):</text>
  <text x="140" y="562" class="box-desc">adc_local = adi.ad4080(uri="local:")  # Arduino shield</text>
  <text x="140" y="577" class="box-desc">m2k = adi.m2k(uri="usb:")  # ADALM2000</text>
  <text x="140" y="592" class="box-desc">adc_remote = adi.ad4080(uri="ip:node.local")  # Network device</text>

  <text x="690" y="525" class="box-desc" font-weight="bold">Layer 7 — Apps:</text>
  <text x="710" y="540" class="box-desc">• Scopy GUI</text>
  <text x="710" y="555" class="box-desc">• Jupyter Lab</text>
  <text x="710" y="570" class="box-desc">• Python scripts</text>
  <text x="710" y="585" class="box-desc">• Web dashboards</text>

  <!-- Bottom note -->
  <text x="450" y="635" class="note-text" text-anchor="middle">Rapid prototyping: hours to running • Multi-device support • Full Linux environment • Familiar tools</text>
  <text x="450" y="652" class="note-text" text-anchor="middle">Perfect for: education • algorithm development • proof-of-concept • demonstrations • multi-sensor systems</text>
</svg>
