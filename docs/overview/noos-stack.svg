<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" class="adi-figure no-background" viewBox="0 0 1200 1010" width="100%" style="max-width: 1180px; height: auto;">
  <defs>
    <marker id="noos-stack-arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrowhead-fill" />
    </marker>
  </defs>

  <!-- Outer panel -->
  <rect x="10" y="10" width="1180" height="990" rx="14" class="adi-panel"/>

  <!-- Title -->
  <text x="600" y="38" class="adi-title" text-anchor="middle">no-OS bare-metal — end-to-end architecture</text>
  <text x="600" y="58" class="adi-subtitle" text-anchor="middle">TinyIIOD and no-OS drivers run in a MicroBlaze while(1) loop — no operating system on the carrier</text>

  <!-- ===================== Sub-panel: Host (Xilinx VCU118 / MicroBlaze) ===================== -->
  <rect x="40" y="80" width="740" height="780" rx="10" class="box" fill="var(--adi-fill-blank)"/>
  <text x="60" y="105" class="adi-section-label">DUT · Xilinx VCU118 carrier (soft-core MicroBlaze)</text>
  <text x="60" y="121" class="adi-panel-sublabel">Same FPGA fabric IP and signal chain as the Linux variants — only the CPU side changes</text>

  <!-- ADI DataX scope: TinyIIOD + no-OS drivers + bare-metal drivers + FPGA fabric IP -->
  <rect x="55" y="135" width="710" height="520" rx="10" class="adi-datax-band"/>
  <text x="76" y="395" class="adi-datax-label" text-anchor="middle" transform="rotate(-90 76 395)">ADI DataX™</text>

  <!-- MicroBlaze while(1) loop panel -->
  <rect x="90" y="145" width="645" height="415" rx="8" class="box" fill="var(--adi-fill-app)"/>
  <text x="412" y="167" class="box-text" text-anchor="middle">MicroBlaze while(1) loop</text>
  <text x="412" y="183" class="box-desc" text-anchor="middle">bare-metal firmware on the carrier's soft-core CPU — no OS, no syscalls</text>

  <!-- TinyIIOD -->
  <rect x="290" y="200" width="245" height="50" rx="5" fill="var(--adi-fill-info)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="412" y="221" class="box-desc" text-anchor="middle" font-weight="bold">TinyIIOD</text>
  <text x="412" y="237" class="box-desc" text-anchor="middle">re-exports the no-OS context over TCP / IP</text>

  <line x1="412" y1="250" x2="412" y2="268" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>

  <!-- no-OS drivers container -->
  <rect x="110" y="268" width="605" height="167" rx="6" fill="var(--adi-fill-drv)" stroke="var(--adi-box-stroke)" stroke-width="1.25"/>
  <text x="412" y="287" class="box-text" text-anchor="middle">no-OS drivers</text>
  <text x="412" y="302" class="box-desc" text-anchor="middle">Source-compatible with the Linux IIO drivers — one library, two homes</text>

  <!-- AD9081 API -->
  <rect x="175" y="315" width="475" height="40" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="412" y="340" class="box-desc" text-anchor="middle" font-weight="bold">AD9081 API</text>

  <!-- Hardware abstraction layer -->
  <rect x="175" y="380" width="475" height="40" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="412" y="405" class="box-desc" text-anchor="middle" font-weight="bold">Hardware abstraction layer</text>

  <!-- Arrows from HW Abstraction down to each bare-metal driver -->
  <line x1="160" y1="435" x2="160" y2="460" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>
  <line x1="278" y1="435" x2="278" y2="460" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>
  <line x1="396" y1="435" x2="396" y2="460" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>
  <line x1="514" y1="435" x2="514" y2="460" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>
  <line x1="632" y1="435" x2="632" y2="460" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>

  <!-- Bare-metal driver row (info-tinted to mark them as runtime libraries, like libUSB on the remote) -->
  <rect x="105" y="460" width="110" height="50" rx="5" fill="var(--adi-fill-info)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="160" y="483" class="box-desc" text-anchor="middle" font-weight="bold">Clock</text>
  <text x="160" y="498" class="box-desc" text-anchor="middle">driver</text>

  <rect x="223" y="460" width="110" height="50" rx="5" fill="var(--adi-fill-info)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="278" y="483" class="box-desc" text-anchor="middle" font-weight="bold">SPI</text>
  <text x="278" y="498" class="box-desc" text-anchor="middle">driver</text>

  <rect x="341" y="460" width="110" height="50" rx="5" fill="var(--adi-fill-info)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="396" y="483" class="box-desc" text-anchor="middle" font-weight="bold">DMA</text>
  <text x="396" y="498" class="box-desc" text-anchor="middle">driver</text>

  <rect x="459" y="460" width="110" height="50" rx="5" fill="var(--adi-fill-info)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="514" y="483" class="box-desc" text-anchor="middle" font-weight="bold">JESD204</text>
  <text x="514" y="498" class="box-desc" text-anchor="middle">driver</text>

  <rect x="577" y="460" width="110" height="50" rx="5" fill="var(--adi-fill-info)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="632" y="483" class="box-desc" text-anchor="middle" font-weight="bold">Network</text>
  <text x="632" y="498" class="box-desc" text-anchor="middle">driver</text>

  <!-- Bottom MicroBlaze panel note -->
  <text x="412" y="537" class="box-desc" text-anchor="middle" font-style="italic">Drivers write AXI registers directly — no kernel, no /dev/uio* in between</text>

  <line x1="412" y1="555" x2="412" y2="572" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>

  <!-- FPGA fabric IP -->
  <rect x="100" y="572" width="625" height="80" rx="8" class="box" fill="var(--adi-fill-mcu)"/>
  <text x="412" y="593" class="box-text" text-anchor="middle">FPGA fabric IP</text>

  <rect x="135" y="605" width="105" height="35" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="187" y="626" class="box-desc" text-anchor="middle" font-weight="bold">SPI</text>

  <rect x="250" y="605" width="105" height="35" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="302" y="626" class="box-desc" text-anchor="middle" font-weight="bold">DMA</text>

  <rect x="365" y="605" width="120" height="35" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="425" y="626" class="box-desc" text-anchor="middle" font-weight="bold">JESD204 IP</text>

  <rect x="495" y="605" width="110" height="35" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="550" y="626" class="box-desc" text-anchor="middle" font-weight="bold">1G MAC</text>

  <line x1="415" y1="652" x2="415" y2="682" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>
  <text x="369" y="672" class="arrow-label">JESD204 / SPI / GPIO</text>

  <!-- AD9081 eval board (kept identical to the Linux variants for parity) -->
  <rect x="100" y="682" width="625" height="120" rx="8" class="box" fill="var(--adi-fill-hw)"/>
  <text x="412" y="702" class="box-text" text-anchor="middle">AD9081 evaluation board</text>
  <text x="412" y="718" class="box-desc" text-anchor="middle">Signal chain — outside DataX scope</text>

  <rect x="180" y="732" width="180" height="55" rx="8" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="270" y="754" class="box-desc" text-anchor="middle" font-weight="bold">HMC7044</text>
  <text x="270" y="770" class="box-desc" text-anchor="middle">clock generator</text>

  <rect x="465" y="732" width="180" height="55" rx="8" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="555" y="754" class="box-desc" text-anchor="middle" font-weight="bold">AD9081</text>
  <text x="555" y="770" class="box-desc" text-anchor="middle">MxFE transceiver</text>

  <line x1="360" y1="759" x2="465" y2="759" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>
  <text x="412" y="753" class="arrow-label" text-anchor="middle">clocks</text>

  <!-- Host footer note -->
  <text x="412" y="830" class="note-text" text-anchor="middle">TinyIIOD exposes the no-OS context for discovery, command, and control</text>
  <text x="412" y="847" class="note-text" text-anchor="middle">over TCP / IP — clients use the same libiio API as on a full Linux carrier.</text>

  <!-- ===================== Sub-panel: Remote host (identical to the Linux variants) ===================== -->
  <rect x="800" y="80" width="380" height="530" rx="10" class="box" fill="var(--adi-fill-blank)"/>
  <text x="820" y="105" class="adi-section-label">Remote host</text>
  <text x="820" y="121" class="adi-panel-sublabel">Linux · Windows · macOS · Raspberry-Pi</text>

  <!-- ADI DataX scope on remote: libiio + libUSB -->
  <rect x="815" y="335" width="350" height="220" rx="10" class="adi-datax-band"/>
  <text x="836" y="455" class="adi-datax-label" text-anchor="middle" transform="rotate(-90 836 455)">ADI DataX™</text>

  <!-- Custom application -->
  <rect x="820" y="140" width="340" height="180" rx="8" class="box" fill="var(--adi-fill-app)"/>
  <text x="990" y="161" class="box-text" text-anchor="middle">Custom application</text>
  <text x="990" y="177" class="box-desc" text-anchor="middle">Anything that can speak libiio</text>

  <text x="840" y="207" class="box-desc" font-weight="bold">IIO-aware</text>
  <text x="915" y="207" class="box-desc">IIO Utils · Scopy · IIO Scope · ACE</text>

  <text x="840" y="229" class="box-desc" font-weight="bold">SDR</text>
  <text x="915" y="229" class="box-desc">SDR Console · SDR# · SDRAngel · GNU Radio</text>

  <text x="840" y="251" class="box-desc" font-weight="bold">Browsers</text>
  <text x="915" y="251" class="box-desc">Chromium · JavaScript</text>

  <text x="840" y="273" class="box-desc" font-weight="bold">Languages</text>
  <text x="915" y="273" class="box-desc">Python · MATLAB · C / C++ · C# · Rust</text>

  <text x="990" y="304" class="box-desc" text-anchor="middle" font-style="italic">Same client code as the Linux variants — only the URI changes</text>

  <line x1="990" y1="320" x2="990" y2="345" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>

  <!-- libiio on remote -->
  <rect x="840" y="345" width="310" height="120" rx="8" class="box" fill="var(--adi-fill-drv)"/>
  <text x="995" y="367" class="box-text" text-anchor="middle">libiio on remote</text>
  <text x="995" y="383" class="box-desc" text-anchor="middle">ip: backend talks to TinyIIOD on the carrier</text>

  <rect x="860" y="395" width="130" height="48" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="925" y="416" class="box-desc" text-anchor="middle" font-weight="bold">usb: backend</text>
  <text x="925" y="430" class="box-desc" text-anchor="middle">via libUSB</text>

  <rect x="1000" y="395" width="130" height="48" rx="5" fill="var(--adi-fill-blank)" stroke="var(--adi-box-stroke)" stroke-width="1"/>
  <text x="1065" y="416" class="box-desc" text-anchor="middle" font-weight="bold">ip: backend</text>
  <text x="1065" y="430" class="box-desc" text-anchor="middle">to TinyIIOD</text>

  <line x1="925" y1="465" x2="925" y2="490" class="arrow" marker-end="url(#noos-stack-arrowhead)"/>

  <!-- libUSB -->
  <rect x="840" y="490" width="310" height="55" rx="8" class="box" fill="var(--adi-fill-info)"/>
  <text x="995" y="513" class="box-text" text-anchor="middle">libUSB</text>
  <text x="995" y="529" class="box-desc" text-anchor="middle">cross-platform USB transport</text>

  <!-- Remote footer note -->
  <text x="995" y="572" class="note-text" text-anchor="middle">Remote functions reach the host over</text>
  <text x="995" y="589" class="note-text" text-anchor="middle">TCP / IP, USB 2/3, serial, Bluetooth, or PCIe.</text>

  <!-- ===================== Network link (dashed) — remote libiio ip: -> host TinyIIOD ===================== -->
  <path d="M 840 419 C 720 419, 700 225, 540 225"
        class="arrow" stroke-dasharray="6,5" fill="none"
        marker-end="url(#noos-stack-arrowhead)"/>
  <text x="700" y="290" class="arrow-label accent-text" text-anchor="middle">Standard discoverable IIO</text>
  <text x="700" y="305" class="arrow-label" text-anchor="middle">command + control over TCP / IP</text>

  <!-- Bottom legend -->
  <text x="600" y="910" class="note-text" text-anchor="middle">User-space client applications (lavender) and the AD9081 evaluation board (peach) sit outside the DataX scope.</text>
  <text x="600" y="927" class="note-text" text-anchor="middle">Everything in the blue band — TinyIIOD, no-OS drivers, the bare-metal drivers, and the FPGA fabric IP — ships with ADI DataX.</text>
  <text x="600" y="958" class="adi-panel-sublabel" text-anchor="middle">Adapted from docs/overview/images/noos_stack.png</text>
</svg>
