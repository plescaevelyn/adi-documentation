<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" class="adi-figure no-background" viewBox="0 0 900 620" width="100%" style="max-width: 880px; height: auto;">
  <defs>
    <marker id="wfpga-arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" class="arrowhead-fill" />
    </marker>
  </defs>

  <!-- Panel -->
  <rect x="10" y="10" width="880" height="600" rx="14" class="adi-panel"/>

  <!-- Title -->
  <text x="450" y="35" class="adi-title" text-anchor="middle">Workflow 1: FPGA + High-Speed Data Converter</text>

  <!-- Layer labels -->
  <text x="30" y="100" class="layer-label">Layer 1</text>
  <text x="30" y="180" class="layer-label">Layer 2</text>
  <text x="30" y="280" class="layer-label">Layer 3</text>
  <text x="30" y="380" class="layer-label">Layer 4</text>
  <text x="30" y="470" class="layer-label">Layers</text>
  <text x="30" y="485" class="layer-label">5-7</text>

  <!-- Layer 1: AD9081 Hardware -->
  <rect x="100" y="75" width="700" height="60" rx="8" class="box" fill="var(--adi-fill-hw)"/>
  <text x="450" y="100" class="box-text" text-anchor="middle">AD9081 MxFE (Multi-Channel Transceiver)</text>
  <text x="450" y="120" class="box-desc" text-anchor="middle">Quad 4 GSPS ADC + Quad 12 GSPS DAC • NCOs, DDCs, DUCs</text>

  <line x1="450" y1="135" x2="450" y2="155" class="arrow" marker-end="url(#wfpga-arrowhead)"/>
  <text x="470" y="148" class="arrow-label">JESD204C (15.5 Gbps/lane)</text>

  <!-- Layer 2: Zynq UltraScale+ -->
  <rect x="100" y="155" width="340" height="90" rx="8" class="box" fill="var(--adi-fill-mcu)"/>
  <text x="270" y="180" class="box-text" text-anchor="middle">Xilinx Zynq UltraScale+ MPSoC</text>
  <text x="270" y="200" class="box-desc" text-anchor="middle">ZCU102 Evaluation Board</text>
  <text x="190" y="222" class="box-desc" text-anchor="middle" font-weight="bold">ARM Side</text>
  <text x="190" y="237" class="box-desc" text-anchor="middle">Cortex-A53 (4 cores)</text>
  <text x="350" y="222" class="box-desc" text-anchor="middle" font-weight="bold">FPGA Side</text>
  <text x="350" y="237" class="box-desc" text-anchor="middle">Programmable Logic</text>

  <!-- Layer 3: HDL Reference Design -->
  <rect x="460" y="155" width="340" height="90" rx="8" class="box" fill="var(--adi-fill-hdl)"/>
  <text x="630" y="180" class="box-text" text-anchor="middle">HDL Reference Design</text>
  <text x="630" y="200" class="box-desc" text-anchor="middle">(Running in FPGA Fabric)</text>
  <text x="630" y="222" class="box-desc" text-anchor="middle">• JESD204 TPL/Link/PHY</text>
  <text x="630" y="237" class="box-desc" text-anchor="middle">• AXI DMA controllers</text>

  <line x1="440" y1="200" x2="460" y2="200" class="arrow" marker-end="url(#wfpga-arrowhead)"/>

  <!-- HDL Components band -->
  <rect x="100" y="265" width="700" height="70" rx="8" class="box" fill="var(--adi-fill-good)" stroke-dasharray="5,5"/>
  <text x="450" y="290" class="box-text" text-anchor="middle">HDL Components (Layer 3)</text>
  <text x="450" y="310" class="box-desc" text-anchor="middle">JESD204 Framework • DMA • Clock Management • AXI Interconnects</text>
  <text x="450" y="327" class="box-desc" text-anchor="middle">Synthesized into FPGA fabric, provides AXI memory-mapped interfaces to ARM</text>

  <line x1="270" y1="245" x2="270" y2="265" class="arrow" marker-end="url(#wfpga-arrowhead)"/>

  <!-- Layer 4: Linux IIO Driver -->
  <rect x="100" y="355" width="700" height="70" rx="8" class="box" fill="var(--adi-fill-drv)"/>
  <text x="450" y="380" class="box-text" text-anchor="middle">Linux IIO Driver (axi-ad9081-rx-hpc)</text>
  <text x="450" y="400" class="box-desc" text-anchor="middle">• Initializes AD9081 via SPI • Configures JESD204 link parameters</text>
  <text x="450" y="417" class="box-desc" text-anchor="middle">• Programs NCOs, filters, DDCs/DUCs • Exposes DMA buffers via IIO</text>

  <line x1="450" y1="335" x2="450" y2="355" class="arrow" marker-end="url(#wfpga-arrowhead)"/>

  <!-- Layers 5-7: Software Stack -->
  <rect x="100" y="445" width="700" height="140" rx="8" class="box" fill="var(--adi-fill-app)"/>
  <text x="450" y="470" class="box-text" text-anchor="middle">Software Stack (Layers 5-7)</text>

  <text x="140" y="495" class="box-desc" font-weight="bold">Layer 5 — libiio:</text>
  <text x="160" y="510" class="box-desc">local: backend for direct access</text>

  <text x="140" y="532" class="box-desc" font-weight="bold">Layer 6 — pyadi-iio:</text>
  <text x="160" y="547" class="box-desc">mxfe = adi.ad9081(uri="local:")</text>
  <text x="160" y="562" class="box-desc">data = mxfe.rx()  # Complex NumPy arrays</text>

  <text x="490" y="495" class="box-desc" font-weight="bold">Layer 7 — Applications:</text>
  <text x="510" y="510" class="box-desc">• MATLAB / GNU Radio</text>
  <text x="510" y="525" class="box-desc">• Custom Python/C++ apps</text>
  <text x="510" y="540" class="box-desc">• SDR frameworks</text>
  <text x="510" y="555" class="box-desc">• Signal intelligence</text>

  <line x1="450" y1="425" x2="450" y2="445" class="arrow" marker-end="url(#wfpga-arrowhead)"/>

  <!-- Bottom note -->
  <text x="450" y="600" class="note-text" text-anchor="middle">High Performance: multi-GSPS sample rates • Low latency (&lt;1µs) • Custom FPGA signal processing</text>
</svg>
